<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Météo dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="script.js" type="module"></script>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div id="toast-container"></div>
        <div class="header">
            <div class="header-left">
                <h1>🌡️ Weather Station</h1>
                <p>Surveillance en temps réel</p>
            </div>
            <div class="header-right">
                <div class="status-dot"></div>
                <span>Connecté · COM2</span>
            </div>
        </div>
        <!-- HERO TEMPERATURE -->
        <div class="hero-card">
            <div class="hero-left">
                <div class="hero-label">Température actuelle</div>
                <div class="hero-value" id="heroTemp">--<sup>°C</sup></div>
            </div>
            <div class="hero-icon">
                <span id="meteo-icon" class="meteo-icon">--</span>
            </div>
        </div>

        <!-- STAT CARDS GRID -->
        <div class="grid">

            <!-- Humidity -->
            <div class="card">
                <div class="card-icon">
                    <i class="bi bi-droplet"></i>
                </div>
                <div class="card-label">Humidité</div>
                <div class="card-value" id="cardHumidity">--<span class="unit">%</span></div>
            </div>

            <!-- Pressure -->
            <div class="card">
                <div class="card-icon">
                    <i class="bi bi-speedometer"></i>
                </div>
                <div class="card-label">Pression atm.</div>
                <div class="card-value" id="cardPressure">--<span class="unit">hPa</span></div>
            </div>

            <!-- Light / LDR -->
            <div class="card">
                <div class="card-icon icon-green">
                    <i class="bi bi-lightbulb-fill"></i>
                </div>
                <div class="card-label">Lumière (LDR)</div>
                <div class="card-value" id="cardLDR">--<span class="unit">lux</span></div>
            </div>
        </div>

        <!-- FAN CONTROL -->
        <div class="fan-card">
            <div class="fan-left">
                <div class="fan-icon-wrap">
                    <i class="bi bi-fan off" id="fanSpinner"></i>
                </div>
                <div class="fan-info">
                    <h3>Ventilateur</h3>
                    <p>Mode : <span class="mode-auto" id="modeLabel">Automatique</span> · Seuil : 25°C</p>
                </div>
            </div>
            <div class="toggle-wrap">
                <span class="toggle-label" id="toggleLabel">OFF</span>
                <label class="toggle">
                    <input type="checkbox" id="fanToggle" />
                    <div class="toggle-track"></div>
                </label>
            </div>
        </div>
    </div>

    <footer style="
        margin-top: 48px;
        padding: 24px;
        text-align: center;
        border-top: 1px solid rgba(100,140,255,0.08);
    ">
        <p style="
            font-size: 1.15rem;
            color: #64748b;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.3px;
        ">
            Fait avec ❤️ par
            <a href="https://github.com/hermeskongo" target="_blank" style="
                color: #5b8fff;
                text-decoration: none;
                font-weight: 500;
                transition: color 0.2s;
                cursor: pointer;
                " onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#5b8fff'">
                Hermès KONGO
            </a>
        </p>
    </footer>
</body>

</html>
